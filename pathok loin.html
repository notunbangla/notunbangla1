<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - নতুন বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .login-card { border: 1px solid #e5e7eb; border-radius: 8px; max-width: 450px; width: 100%; padding: 40px; background: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="login-card shadow-sm">
        <div class="flex flex-col items-center mb-6 relative">
            <button class="absolute left-0 top-1 text-gray-600 hover:text-black flex items-center gap-1">
                <i class="fa-solid fa-chevron-left text-sm"></i> Back
            </button>
            <img src="notun_bangla_logo.png" alt="নতুন বাংলা" class="h-10 mb-4">
            <h1 class="text-2xl font-bold text-blue-600">Login</h1>
            <p class="text-gray-600 mt-1">to continue to <span class="font-bold">Notun Bangla</span></p>
        </div>

        <div class="space-y-3 mb-6">
            <button class="w-full bg-[#1877F2] text-white py-2.5 rounded-md flex items-center justify-center gap-3 hover:bg-blue-700 transition font-semibold">
                <i class="fa-brands fa-facebook-f text-lg"></i>
                Sign in with Facebook
            </button>
            
            <button class="w-full border border-blue-500 text-blue-600 py-2.5 rounded-md flex items-center justify-center gap-3 hover:bg-blue-50 transition font-semibold bg-white">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="w-5 h-5">
                Sign in with Google
            </button>
        </div>

        <div class="flex items-center gap-4 mb-6">
            <div class="h-[1px] bg-gray-200 flex-1"></div>
            <span class="text-gray-400 text-sm">Or</span>
            <div class="h-[1px] bg-gray-200 flex-1"></div>
        </div>

        <form class="space-y-4">
            <div>
                <input type="email" placeholder="Email" class="w-full px-4 py-2.5 border border-gray-300 rounded-md outline-none focus:border-blue-500 transition">
            </div>
            <div class="relative">
                <input type="password" placeholder="Password" class="w-full px-4 py-2.5 border border-gray-300 rounded-md outline-none focus:border-blue-500 transition">
                <button type="button" class="absolute right-4 top-2.5 text-blue-600 font-semibold text-sm">Show</button>
            </div>

            <button class="w-full bg-[#E63946] text-white py-3 rounded-md font-bold text-lg hover:bg-red-700 transition mt-2">
                LOGIN
            </button>
        </form>

        <div class="text-center mt-6 space-y-2">
            <a href="#" class="text-blue-600 text-sm hover:underline">Forgot password?</a>
            <p class="text-gray-700">
                New to Notun Bangla? <a href="#" class="text-red-600 font-bold hover:underline">Create an account</a>
            </p>
        </div>

        <div class="text-center mt-10 text-[10px] text-gray-400 leading-relaxed">
            By proceeding, you agree to <a href="#" class="underline">Terms of Use</a> and <a href="#" class="underline">Privacy Policy</a> of <br> Notun Bangla
        </div>
    </div>

</body>
</html>
