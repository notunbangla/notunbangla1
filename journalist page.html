<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাংবাদিক প্রোফাইল - নতুন বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .bg-black-custom { background-color: #000000; }
        .text-gold { color: #D48806; }
        
        /* বাম দিকে লেপ্টে যাওয়ার এবং হভার ইফেক্ট */
        .info-row {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .info-row:hover {
            background-color: #1a1a1a; /* হালকা ধূসর কালো */
            padding-left: 10px; /* মাউস নিলে বামে একটু সরবে */
        }
        .info-row:hover .text-gold {
            color: #ffcc00; /* হভারে গোল্ড কালার উজ্জ্বল হবে */
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 bg-white p-6 shadow-sm border border-gray-100">
            <div class="flex items-center space-x-4 mb-6">
                <img src="https://via.placeholder.com/80" alt="Profile" class="w-20 h-20 rounded-full border-2 border-gray-200">
                <div class="text-left">
                    <p class="text-teal-500 text-sm font-bold">সাংবাদিক</p>
                    <h2 class="text-3xl text-gold font-bold">মো. আবু বক্কার সিদ্দিক বাবু</h2>
                    <p class="text-gray-600 text-sm font-semibold">উল্লাপাড়া (সিরাজগঞ্জ) প্রতিনিধি</p>
                    <div class="h-1 w-20 bg-teal-500 mt-1"></div>
                </div>
            </div>

            <div class="space-y-1 mt-8">
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full overflow-hidden py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">রক্তের গ্রুপ:</div>
                    <div class="w-1/2 text-right md:text-center italic">এ প্লাস</div>
                </div>
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">যোগদান:</div>
                    <div class="w-1/2 text-right md:text-center italic text-sm">৫ জুলাই ২০২১</div>
                </div>
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">আইডি নম্বর:</div>
                    <div class="w-1/2 text-right md:text-center italic">এম-১৮০২৪৫৮</div>
                </div>
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">মোবাইল নম্বর:</div>
                    <div class="w-1/2 text-right md:text-center italic text-sm">০১৭৫০-৯৬২৮৭৫</div>
                </div>
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">ই-মেইল:</div>
                    <div class="w-1/2 text-right md:text-center italic text-xs md:text-sm">mukthoprovat@gmail.com</div>
                </div>
                <div class="info-row flex bg-black-custom text-white rounded-l-full rounded-r-full py-2 px-10">
                    <div class="w-1/2 text-gold font-bold text-left">ফেসবুক:</div>
                    <div class="w-1/2 text-right md:text-center italic text-sm">MD Rashidul Islam</div>
                </div>
            </div>

            <div class="mt-12 bg-pink-600 text-white p-4 flex items-center justify-between rounded shadow-md">
                <div class="flex items-center space-x-2">
                    <div class="bg-white p-1 rounded text-xs text-red-600 font-bold uppercase">Brac</div>
                    <span class="text-lg md:text-2xl font-bold">করোনার টিকার জন্য নিবন্ধন করতে</span>
                </div>
                <button class="bg-white text-pink-600 font-bold px-4 py-1 rounded shadow text-sm hover:bg-gray-100">ক্লিক করুন</button>
            </div>
        </div>

        <div class="bg-white p-6 shadow-sm border border-gray-100 h-fit">
            <div class="bg-black text-white p-2 mb-4 border-b-4 border-blue-600">
                <h3 class="text-lg font-bold text-gold text-center italic">সাংবাদিককে খুঁজুন</h3>
            </div>
            
            <div class="space-y-4">
                <select class="w-full border border-gray-300 p-2 rounded text-gray-500 focus:outline-none focus:border-blue-500">
                    <option>নাম</option>
                </select>
                <select class="w-full border border-gray-300 p-2 rounded text-gray-500 focus:outline-none focus:border-blue-500">
                    <option>পদবি</option>
                </select>
                <select class="w-full border border-gray-300 p-2 rounded text-gray-500 focus:outline-none focus:border-blue-500">
                    <option>আইডি নম্বর</option>
                </select>
                <button class="w-full bg-blue-500 text-white py-3 rounded flex justify-center items-center font-bold shadow-lg hover:bg-blue-600 transition duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    খুঁজুন
                </button>
                </button>
            </div>
        </div>

    </div>

</body>
</html>
